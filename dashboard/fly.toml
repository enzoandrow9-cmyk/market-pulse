# ── Market Pulse Terminal — Fly.io config ─────────────────────────────────────
# Generated for deployment on Fly.io
# App name: set when you run `fly launch` — replace "market-pulse-terminal" below

app = "market-pulse-terminal"
primary_region = "iad"   # US East (Washington DC) — change to nearest: lax, ord, dfw, mia

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port       = 8050
  force_https         = true
  auto_stop_machines  = true   # spin down when idle to save cost
  auto_start_machines = true   # spin back up on first request
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpus   = 1
